name: Website Screenshots

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: website-screenshots-main
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start app
        run: npm run start -- --hostname 127.0.0.1 --port 3000 &

      - name: Wait for app
        run: npx wait-on http://127.0.0.1:3000/en

      - name: Capture screenshots (EN/ZH + Light/Dark)
        run: |
          mkdir -p screenshots

          # EN light/dark
          npx playwright screenshot --full-page --color-scheme=light --wait-for-selector "ul.grid li" "http://127.0.0.1:3000/en?city=New%20York" screenshots/en-light-city.png
          npx playwright screenshot --full-page --color-scheme=dark --wait-for-selector "ul.grid li" "http://127.0.0.1:3000/en?city=New%20York" screenshots/en-dark-city.png
          npx playwright screenshot --full-page --color-scheme=light --wait-for-selector "ul.grid li" "http://127.0.0.1:3000/en" screenshots/en-light-full.png
          npx playwright screenshot --full-page --color-scheme=dark --wait-for-selector "ul.grid li" "http://127.0.0.1:3000/en" screenshots/en-dark-full.png

          # ZH light/dark
          npx playwright screenshot --full-page --color-scheme=light --wait-for-selector "ul.grid li" "http://127.0.0.1:3000/zh?city=%E4%B8%8A%E6%B5%B7" screenshots/zh-light-city.png
          npx playwright screenshot --full-page --color-scheme=dark --wait-for-selector "ul.grid li" "http://127.0.0.1:3000/zh?city=%E4%B8%8A%E6%B5%B7" screenshots/zh-dark-city.png
          npx playwright screenshot --full-page --color-scheme=light --wait-for-selector "ul.grid li" "http://127.0.0.1:3000/zh" screenshots/zh-light-full.png
          npx playwright screenshot --full-page --color-scheme=dark --wait-for-selector "ul.grid li" "http://127.0.0.1:3000/zh" screenshots/zh-dark-full.png

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-screenshots
          path: screenshots
          if-no-files-found: error

      - name: Commit screenshots to repository
        run: |
          if [ -z "$(git status --porcelain screenshots)" ]; then
            echo "No screenshot updates"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A screenshots
          git commit -m "docs: auto-update screenshots [skip ci]"

          # Avoid non-fast-forward failures when other workflows push to main.
          git pull --rebase origin main
          git push origin HEAD:main
